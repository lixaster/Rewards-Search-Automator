<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rewards 自动执行器</title>
    <link href="./css/bootstrap.min.css" rel="stylesheet">
    <link href="./css/fa-all.min.css" rel="stylesheet">
    <link href="./css/custom.css" rel="stylesheet">
</head>

<body>
    <!-- Header -->
    <div class="app-header text-center">
        <div class="header-icon">
            <i class="fa-solid fa-trophy"></i>
        </div>
    <h1 class="app-title">Rewards 自动执行器</h1>
    <p class="app-subtitle">为 Microsoft Rewards 自动执行 Bing 搜索</p>
    </div>

    <div class="container-fluid px-3">
        <!-- Action Buttons -->
        <div class="row g-2 mb-3">
            <div class="col-4">
                <button type="button" class="btn btn-action btn-desktop w-100" id="desktopButton">
                    <i class="fa-solid fa-desktop"></i>
                    <span>桌面</span>
                </button>
            </div>
            <div class="col-4">
                <button type="button" class="btn btn-action btn-mobile w-100" id="mobileButton">
                    <i class="fa-solid fa-mobile-screen"></i>
                    <span>移动设备</span>
                </button>
            </div>
            <div class="col-4">
                <button type="button" class="btn btn-action btn-both w-100" id="desktopMobileButton">
                    <i class="fa-solid fa-layer-group"></i>
                    <span>同时</span>
                </button>
            </div>
        </div>

        <!-- Stop Button (hidden by default) -->
        <div class="row g-2 mb-3" id="stopButtonContainer" style="display: none;">
            <div class="col-12">
                <button type="button" class="btn btn-danger w-100" id="stopButton">
                    <i class="fa-solid fa-stop"></i>
                    <span>停止搜索</span>
                </button>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="row mb-3">
            <div class="col-12">
                <div class="progress">
                    <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar"
                        aria-valuemin="0" aria-valuemax="100" style="width: 0%">
                    </div>
                </div>
            </div>
        </div>

        <!-- Settings Form -->
        <div class="row g-2 mb-2">
            <div class="col-6">
                <label class="form-label">
                    <i class="fa-solid fa-desktop"></i> 桌面
                </label>
                <input type="number" class="form-control form-control-sm" 
                    id="totDesktopSearchesForm" min="1" value="">
            </div>
            <div class="col-6">
                <label class="form-label">
                    <i class="fa-solid fa-mobile-screen"></i> 移动设备
                </label>
                <input type="number" class="form-control form-control-sm" 
                    id="totMobileSearchesForm" min="1" value="">
            </div>
        </div>

        <div class="row g-2 mb-1">
            <div class="col-6">
                <label class="form-label">
                    <i class="fa-solid fa-hourglass-start"></i> 最小（秒）
                </label>
                <input type="number" class="form-control form-control-sm"
                    id="waitingBetweenSearchesFormMin" min="1" value="">
            </div>
            <div class="col-6">
                <label class="form-label">
                    <i class="fa-solid fa-hourglass-end"></i> 最大（秒）
                </label>
                <input type="number" class="form-control form-control-sm"
                    id="waitingBetweenSearchesFormMax" min="1" value="">
            </div>
        </div>

        <!-- F1 Promo Banner -->
         <!-- 删除Formula 1 Fan -->
        <!-- <div class="row">
            <div class="col-12">
                <a href="" 
                   target="_blank" 
                   class="btn-f1-promo"
                   id="btn-f1-promo">
                    <i class="fa-solid fa-flag-checkered"></i>
                    <span>Formula 1 Fan?</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </a>
            </div>
        </div> -->
    </div>

    <!-- Footer -->
    <nav class="navbar navbar-expand fixed-bottom app-footer">
        <div class="container-fluid">
            <span class="footer-version" id="appVersion"></span>
            <ul class="navbar-nav ms-auto">
                <!-- 作者网站 -->
                <!-- <li class="nav-item">
                    <a class="nav-link footer-link" href="" target="_blank"
                        title="作者网站" id="authorWebsiteLink">
                        <i class="fa-solid fa-user-astronaut"></i>
                    </a>
                </li> -->
                <li class="nav-item">
                    <a class="nav-link footer-link" href=""
                        target="_blank" title="源代码" id="repositoryGithubLink">
                        <i class="fa-brands fa-github"></i>
                    </a>
                </li>
                <!-- Chrome 商店 -->
                <!-- <li class="nav-item">
                    <a class="nav-link footer-link" href=""
                        target="_blank" title="Chrome 商店" id="storeLink">
                        <i class="fa-brands fa-chrome"></i>
                    </a>
                </li> -->
                <li class="nav-item">
                    <a class="nav-link footer-link" href="" 
                        target="_blank" title="Microsoft Rewards（微软奖励）" id="rewardsLink">
                        <i class="fa-solid fa-medal"></i>
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <script src="./js/jquery-3.6.0.min.js"></script>
    <script src="./js/fa-all.min.js"></script>
    <script type="module" src="./js/popup.js"></script>
</body>

</html>
